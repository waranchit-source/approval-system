<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approval System</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5" id="loginContainer">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-5">
            <div class="glass-panel text-center mb-4">
                <h1 class="fw-bolder ig-text">Approval<br>System</h1>
            </div>
            <div class="glass-panel">
                <div id="loginAlert" class="alert alert-danger" style="display:none;"></div>
                <form id="loginForm">
                    <div class="mb-4">
                        <label class="form-label text-light fw-semibold">Email</label>
                        <input type="email" class="form-control neon-input" id="loginId" required>
                    </div>
                    <div class="mb-4 position-relative">
                        <label class="form-label text-light fw-semibold">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control neon-input border-end-0" id="loginPass" required>
                            <span class="input-group-text neon-input bg-transparent border-start-0 text-light" id="togglePassword" style="cursor: pointer;">
                                <i class="fa-regular fa-eye"></i>
                            </span>
                        </div>
                    </div>
                    <div class="mb-4 form-check d-flex align-items-center">
                        <input type="checkbox" class="form-check-input mt-0 me-2" id="rememberMe">
                        <label class="form-check-label text-light" for="rememberMe">Remember me</label>
                    </div>
                    <button type="submit" class="btn btn-ig w-100 py-3 fw-bold rounded-pill" id="btnLogin">Login</button>
                </form>
                <div class="text-center mt-4">
                    <a href="#" id="showRegister" class="text-light text-decoration-none border-bottom border-light pb-1">Create new account</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container py-5" id="registerContainer" style="display:none;">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6">
            <div class="glass-panel">
                <h3 class="fw-bolder ig-text text-center mb-4">Register</h3>
                <div id="registerAlert" class="alert alert-info" style="display:none;"></div>
                <form id="registerForm">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-light fw-semibold">Email</label>
                            <input type="email" class="form-control neon-input" id="regId" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-light fw-semibold">Password</label>
                            <input type="password" class="form-control neon-input" id="regPass" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-light fw-semibold">Full Name</label>
                            <input type="text" class="form-control neon-input" id="regName" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label text-light fw-semibold">Branch</label>
                            <select class="form-select neon-input form-select-custom" id="regBranch" required></select>
                        </div>
                        <div class="col-md-12 mt-4">
                            <button type="submit" class="btn btn-ig w-100 py-3 fw-bold rounded-pill mb-3" id="btnRegister">Sign Up</button>
                            <button type="button" class="btn btn-outline-light w-100 py-3 fw-bold rounded-pill" id="showLogin">Back to Login</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="app-layout" id="appContainer" style="display:none;">
    <aside class="sidebar glass-panel-side" id="sidebarMenu">
        <div class="sidebar-header d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bolder ig-text m-0">System</h3>
                <span id="userRoleBadge" class="badge ig-bg rounded-pill mt-2 px-3 py-2"></span>
            </div>
            <button class="btn btn-link text-light fs-4 p-0 m-0" id="btnToggleSidebar"><i class="fa-solid fa-bars"></i></button>
        </div>
        <ul class="nav flex-column mb-auto side-menu">
            <li class="nav-item">
                <a href="#" class="nav-link active sidemenu-btn" data-target="formSection">
                    <i class="fa-solid fa-pen-nib"></i> <span>New Request</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link sidemenu-btn" data-target="dashboardSection" id="btnLoadDashboard">
                    <i class="fa-solid fa-layer-group"></i> <span>Dashboard</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <p id="sidebarUserName" class="text-light fw-bold mb-3 text-center truncate-text"></p>
            <button class="btn btn-outline-light rounded-pill w-100 fw-bold sidebar-logout" id="btnLogout"><i class="fa-solid fa-right-from-bracket me-2"></i><span>Logout</span></button>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-header d-flex align-items-center mb-4">
            <button class="btn btn-link text-light fs-4 p-0 me-3 d-md-none" id="btnMobileToggle"><i class="fa-solid fa-bars"></i></button>
            <h2 class="fw-bolder text-light m-0 page-title">Create Request</h2>
            <span class="badge bg-dark rounded-pill px-3 py-2 border border-secondary ms-auto" id="autoDate"></span>
        </div>

        <div id="formSection" class="content-section">
            <div class="glass-panel">
                <form id="approvalForm">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-light d-block mb-3">Document Type</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="docType" id="typeVoucher" value="Payment Voucher" required checked>
                            <label class="form-check-label text-light" for="typeVoucher">Payment Voucher</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="docType" id="typePetty" value="Petty Cash" required>
                            <label class="form-check-label text-light" for="typePetty">Petty Cash</label>
                        </div>
                    </div>

                    <div class="row mb-5 g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-secondary">Requestor Name</label>
                            <input type="text" class="form-control neon-input bg-dark text-light border-0" id="requestorEmail" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-light">Send to Approver</label>
                            <select class="form-select neon-input form-select-custom" id="approverEmail" required>
                                <option value="">Loading...</option>
                            </select>
                        </div>
                    </div>

                    <h5 class="fw-bolder text-light mb-4">Items Detail</h5>
                    <div id="itemsContainer"></div>

                    <div class="text-end mb-4">
                        <button type="button" class="btn btn-outline-light rounded-pill px-4 fw-bold btn-sm" id="btnAddItem"><i class="fa-solid fa-plus me-2"></i>Add Item</button>
                    </div>

                    <div class="d-flex justify-content-between align-items-center border-top border-secondary pt-4 mt-4">
                        <div id="statusMessage" class="fw-bold"></div>
                        <button type="submit" class="btn btn-light text-dark rounded-pill px-5 py-3 fw-bold" id="btnSubmit">Save Request (Draft) <i class="fa-solid fa-save ms-2"></i></button>
                    </div>
                </form>
            </div>
        </div>

        <div id="dashboardSection" class="content-section" style="display:none;">
            <div class="row mb-4 align-items-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <div class="position-relative">
                        <i class="fa-solid fa-magnifying-glass position-absolute text-secondary" style="left: 15px; top: 14px;"></i>
                        <input type="text" id="searchDashboard" class="form-control neon-input ps-5" placeholder="Search Ref No., Date, or Requestor Name...">
                    </div>
                </div>
                <div class="col-md-6 text-md-end">
                    <button class="btn btn-ig rounded-pill px-4 fw-bold btn-sm me-2" id="btnBatchSend"><i class="fa-solid fa-paper-plane me-2"></i>Send Approval Email</button>
                    <button class="btn btn-outline-light rounded-pill px-4 fw-bold btn-sm" id="btnRefreshDashboard"><i class="fa-solid fa-rotate-right me-2"></i>Refresh</button>
                </div>
            </div>
            
            <div class="glass-panel p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-dark table-hover align-middle m-0 custom-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;" class="text-center">#</th>
                                <th>Req No.</th>
                                <th>Date</th>
                                <th>Requestor</th>
                                <th>Status</th>
                                <th class="text-end">Total</th>
                                <th class="text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dashboardTableBody">
                            <tr><td colspan="7" class="text-center py-5 text-secondary">Loading requests...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Approval -->
<div class="modal fade" id="approvalModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content glass-panel p-0 border-secondary">
      <div class="modal-header border-secondary text-light">
        <h5 class="modal-title fw-bolder ig-text"><i class="fa-solid fa-list-check me-2"></i>Review Request <span id="modalReqNo"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4">
         <form id="modalApprovalForm">
             <input type="hidden" id="modalReqNoInput">
             <div class="table-responsive mb-4">
                 <table class="table table-dark table-bordered border-secondary align-middle m-0">
                     <thead class="table-secondary text-dark">
                         <tr>
                             <th class="text-center">#</th>
                             <th>Description & Details</th>
                             <th class="text-end">Total</th>
                             <th class="text-center">Action</th>
                         </tr>
                     </thead>
                     <tbody id="modalItemsBody"></tbody>
                 </table>
             </div>
             <div id="modalAlert" class="fw-bold mb-3"></div>
             <div class="d-flex justify-content-end">
                 <button type="submit" class="btn btn-ig rounded-pill px-5 fw-bold" id="btnSubmitReview">Submit Selections</button>
             </div>
         </form>
      </div>
    </div>
  </div>
</div>

<template id="itemTemplate">
    <div class="item-block p-4 mb-4 rounded-4 bg-black border border-secondary position-relative">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bolder ig-text m-0">Item #<span class="item-number">1</span></h6>
            <button type="button" class="btn btn-sm btn-danger rounded-pill px-3 fw-bold btn-remove-item" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label text-secondary fw-semibold text-sm">Description</label>
                <input type="text" class="form-control neon-input item-desc" required>
            </div>
            
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold text-sm">Product Photo <small>(Max 2MB)</small></label>
                <input type="file" class="form-control neon-input item-photo" accept="image/*">
            </div>
            <div class="col-md-6">
                <label class="form-label text-secondary fw-semibold text-sm">Image URL</label>
                <input type="text" class="form-control neon-input item-imageurl">
            </div>

            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold text-sm">Amount</label>
                <input type="number" step="0.01" class="form-control neon-input item-amt" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold text-sm">VAT (7%)</label>
                <input type="number" step="0.01" class="form-control neon-input item-vat" required>
            </div>
            <div class="col-md-3">
                <label class="form-label text-secondary fw-semibold text-sm">WHT</label>
                <input type="number" step="0.01" class="form-control neon-input item-wht" value="0">
            </div>
            <div class="col-md-3">
                <label class="form-label ig-text fw-bold text-sm">Total</label>
                <input type="number" step="0.01" class="form-control neon-input bg-dark text-white fw-bold item-total" readonly>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold text-sm">Invoice No.</label>
                <input type="text" class="form-control neon-input item-inv">
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold text-sm">Branch</label>
                <select class="form-select neon-input form-select-custom item-branch" required></select>
            </div>
            <div class="col-md-4">
                <label class="form-label text-secondary fw-semibold text-sm">Department</label>
                <select class="form-select neon-input form-select-custom item-dept" required></select>
            </div>
            <div class="col-md-12">
                <label class="form-label text-secondary fw-semibold text-sm">Remarks</label>
                <input type="text" class="form-control neon-input item-remark">
            </div>
            <div class="col-md-4">
                <label class="form-label text-light fw-bold text-sm">Payment Method</label>
                <select class="form-select neon-input border-light form-select-custom item-paymethod" required></select>
            </div>
            <div class="col-md-8">
                <div class="row g-2 bank-details-container" style="display:none;">
                    <div class="col-md-4 bank-col" style="display:none;">
                        <label class="form-label text-secondary fw-semibold text-sm">Bank</label>
                        <select class="form-select neon-input form-select-custom item-bank"></select>
                    </div>
                    <div class="col-md-4 accname-col" style="display:none;">
                        <label class="form-label text-secondary fw-semibold text-sm">Account Name</label>
                        <input type="text" class="form-control neon-input item-accname">
                    </div>
                    <div class="col-md-4 accno-col" style="display:none;">
                        <label class="form-label text-secondary fw-semibold text-sm">Account No.</label>
                        <input type="text" class="form-control neon-input item-accno">
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
